<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>


<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100 " id="valida">
        <form class="w-50 p-4 border rounded bg-white shadow" id="meuFormulario">

            <h3 class="text-center mb-4">Fomulo coisas</h3>

            <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input class="form-control" id="nome" type="text" placeholder="Digite seu nome">
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Digite seu email">
            </div>

            <div class="mb-3">
                <label for="idade" class="form-label">Idade</label>
                <input type="number" class="form-control" id="idade" min="0" max="120" placeholder="Sua idade">
            </div>

            <button class="btn btn-primary w-100" type="submit">Enviar</button>

        </form>
    </div>

</body>

<script src="validacao.js"></script>

</html>
